<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Jay Prajapati</title>
    <script>
        // Store the intended path in sessionStorage and redirect to root.
        // index.html will pick it up and restore the correct URL before Flutter boots.
        var path = window.location.pathname + window.location.search + window.location.hash;
        sessionStorage.setItem('redirect_path', path);
        window.location.replace('/');
    </script>
</head>

<body></body>

</html>
